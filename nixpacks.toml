# Railway/Nixpacks config for NeuralSearch Presentation Generator
# Installs Playwright + Chromium for PDF export

[phases.install]
cmds = [
  "python -m pip install -r requirements.txt",
  "python -m playwright install --with-deps chromium"
]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:${PORT:-5000} --workers 1 --timeout 600"
